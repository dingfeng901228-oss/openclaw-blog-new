name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: my-blog/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: my-blog

      - name: Build Next.js
        run: npm run build
        working-directory: my-blog
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        run: |
          export CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          export CLOUDFLARE_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          npx wrangler pages deploy my-blog/out --project-name=openclaw-blog