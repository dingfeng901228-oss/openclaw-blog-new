<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="lobsterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5cc"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
  </defs>

  <!-- Background tile -->
  <rect x="0" y="0" width="120" height="120" rx="24" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow -->
  <rect x="2" y="2" width="116" height="116" rx="22" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.18"/>

  <!-- Lobster body -->
  <path d="M60 22 C32 22 22 44 22 60 C22 78 34 92 46 96 L46 104 L54 104 L54 96 C54 96 60 98 66 96 L66 104 L74 104 L74 96 C86 92 98 78 98 60 C98 44 88 22 60 22Z" fill="url(#lobsterGrad)"/>

  <!-- Body segment lines -->
  <path d="M30 58 Q60 62 90 58" stroke="#7f1d1d" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M30 70 Q60 74 90 70" stroke="#7f1d1d" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M30 82 Q60 86 90 82" stroke="#7f1d1d" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Left Claw -->
  <path d="M22 50 C4 44 -2 56 4 68 C10 80 22 72 28 60 C31 53 28 50 22 50Z" fill="url(#clawGrad)"/>
  <!-- Left Claw pincer -->
  <path d="M4 68 L1 62 L7 64 Z" fill="url(#clawGrad)"/>
  <path d="M4 68 L2 76 L8 72 Z" fill="url(#clawGrad)"/>

  <!-- Right Claw -->
  <path d="M98 50 C116 44 122 56 116 68 C110 80 98 72 92 60 C89 53 92 50 98 50Z" fill="url(#clawGrad)"/>
  <!-- Right Claw pincer -->
  <path d="M116 68 L119 62 L113 64 Z" fill="url(#clawGrad)"/>
  <path d="M116 68 L118 76 L112 72 Z" fill="url(#clawGrad)"/>

  <!-- Antennae -->
  <path d="M48 26 Q38 12 32 16" stroke="#ff4d4d" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="32" cy="16" r="2" fill="#ff4d4d"/>
  <path d="M72 26 Q82 12 88 16" stroke="#ff4d4d" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="88" cy="16" r="2" fill="#ff4d4d"/>

  <!-- Eyes -->
  <circle cx="48" cy="42" r="7" fill="#0f172a"/>
  <circle cx="72" cy="42" r="7" fill="#0f172a"/>
  <circle cx="49" cy="41" r="3.5" fill="url(#eyeGrad)"/>
  <circle cx="73" cy="41" r="3.5" fill="url(#eyeGrad)"/>
  <circle cx="50" cy="40" r="1.2" fill="#ffffff"/>
  <circle cx="74" cy="40" r="1.2" fill="#ffffff"/>

  <!-- Tiny legs (subtle hint) -->
  <path d="M40 88 L36 96 M50 92 L48 100 M70 92 L72 100 M80 88 L84 96" stroke="#7f1d1d" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
</svg>
